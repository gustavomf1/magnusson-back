services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: magnossao
      POSTGRES_USER: magnossao
      POSTGRES_PASSWORD: magnossao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magnossao"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/magnossao &&
        mc anonymous set public local/magnossao &&
        printf '[{\"AllowedHeaders\":[\"*\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"DELETE\",\"HEAD\"],\"AllowedOrigins\":[\"*\"],\"ExposeHeaders\":[\"ETag\"]}]' > /tmp/cors.json &&
        mc cors set local/magnossao /tmp/cors.json &&
        echo 'Bucket magnossao criado, publico e com CORS configurado.'
      "
    restart: on-failure

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/magnossao
      DATABASE_USER: magnossao
      DATABASE_PASSWORD: magnossao
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PRESIGN_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: magnossao
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/magnossao
      APP_CORS_ORIGIN: ${APP_CORS_ORIGIN:-http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-key-change-in-prod}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-TEST-0000000000000000-000000-00000000000000000000000000000000-000000000}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-dev-only-insecure-webhook-secret}

volumes:
  postgres_data:
  minio_data:
