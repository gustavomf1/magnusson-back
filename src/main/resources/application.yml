spring:
  application:
    name: magnossao-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/magnossao}
    username: ${DATABASE_USER:magnossao}
    password: ${DATABASE_PASSWORD:magnossao}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  cors:
    origin: ${APP_CORS_ORIGIN:http://localhost:3000}

storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  bucket: ${STORAGE_BUCKET:magnossao}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  region: ${STORAGE_REGION:us-east-1}
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:9000/magnossao}
